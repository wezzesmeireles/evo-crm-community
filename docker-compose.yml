services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-evo_community}
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evoai_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass ${REDIS_PASSWORD:-evoai_redis_pass} --appendonly yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-evoai_redis_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  # ---------------------------------------------------------------------------
  # Auth Service (Ruby / Rails) — Port 3001
  # ---------------------------------------------------------------------------
  evo-auth:
    build:
      context: https://github.com/EvolutionAPI/evo-auth-service-community.git
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3011:3001"
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/1
      POSTGRES_HOST: postgres
    depends_on:
      - postgres
      - redis
    command: bash -c "bundle exec rails db:prepare && bundle exec rails s -p 3001 -b 0.0.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  evo-auth-sidekiq:
    build:
      context: https://github.com/EvolutionAPI/evo-auth-service-community.git
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/1
      POSTGRES_HOST: postgres
    depends_on:
      - postgres
      - redis
    command: bash -c "bundle exec sidekiq"

  # ---------------------------------------------------------------------------
  # CRM Service (Ruby / Rails) — Port 3000
  # ---------------------------------------------------------------------------
  evo-crm:
    build:
      context: https://github.com/EvolutionAPI/evo-ai-crm-community.git
      dockerfile: docker/Dockerfile
      args:
        BUNDLE_WITHOUT: "development test"
        RAILS_ENV: production
        RAILS_SERVE_STATIC_FILES: "true"
    restart: unless-stopped
    ports:
      - "3010:3000"
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/0
      POSTGRES_HOST: postgres
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET:-evo-bot-runtime-dev-secret}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo-crm:3000
    volumes:
      - crm_bundle:/usr/local/bundle
      - crm_cache:/app/tmp/cache
    depends_on:
      - postgres
      - redis
      - evo-auth
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  evo-crm-sidekiq:
    build:
      context: https://github.com/EvolutionAPI/evo-ai-crm-community.git
      dockerfile: docker/Dockerfile
      args:
        BUNDLE_WITHOUT: "development test"
        RAILS_ENV: production
        RAILS_SERVE_STATIC_FILES: "true"
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: ${RAILS_ENV:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379/0
      POSTGRES_HOST: postgres
      EVO_AUTH_SERVICE_URL: http://evo-auth:3001
      EVO_AI_CORE_SERVICE_URL: http://evo-core:5555
      BOT_RUNTIME_URL: http://evo-bot-runtime:8080
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET:-evo-bot-runtime-dev-secret}
      BOT_RUNTIME_POSTBACK_BASE_URL: http://evo-crm:3000
    volumes:
      - crm_bundle:/usr/local/bundle
      - crm_cache:/app/tmp/cache
    depends_on:
      - postgres
      - redis
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # ---------------------------------------------------------------------------
  # Core Service (Go / Gin) — Port 5555
  # ---------------------------------------------------------------------------
  evo-core:
    build:
      context: https://github.com/EvolutionAPI/evo-ai-core-service-community.git
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5556:5555"
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USERNAME:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-evoai_dev_password}
      DB_NAME: ${POSTGRES_DATABASE:-evo_community}
      DB_SSLMODE: disable
      PORT: "5555"
      EVOLUTION_BASE_URL: http://evo-crm:3000
      EVO_AUTH_BASE_URL: http://evo-auth:3001
      AI_PROCESSOR_URL: http://evo-processor:8000
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5555/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Processor Service (Python / FastAPI) — Port 8000
  # ---------------------------------------------------------------------------
  evo-processor:
    build:
      context: https://github.com/EvolutionAPI/evo-ai-processor-community.git
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      POSTGRES_CONNECTION_STRING: postgresql://${POSTGRES_USERNAME:-postgres}:${POSTGRES_PASSWORD:-evoai_dev_password}@postgres:5432/${POSTGRES_DATABASE:-evo_community}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-evoai_redis_pass}
      REDIS_SSL: "false"
      HOST: 0.0.0.0
      PORT: "8000"
      EVO_AI_CRM_URL: http://evo-crm:3000
      CORE_SERVICE_URL: http://evo-core:5555/api/v1
    volumes:
      - processor_logs:/app/logs
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Bot Runtime (Go / Gin) — Port 8080
  # ---------------------------------------------------------------------------
  evo-bot-runtime:
    build:
      context: https://github.com/EvolutionAPI/evo-bot-runtime.git
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      LISTEN_ADDR: 0.0.0.0:8080
      REDIS_URL: redis://:${REDIS_PASSWORD:-evoai_redis_pass}@redis:6379
      AI_PROCESSOR_URL: http://evo-processor:8000
      BOT_RUNTIME_SECRET: ${BOT_RUNTIME_SECRET:-evo-bot-runtime-dev-secret}
    depends_on:
      - redis
      - evo-processor
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend (React / Vite / Nginx) — Port 5173
  # ---------------------------------------------------------------------------
  evo-frontend:
    build:
      context: https://github.com/EvolutionAPI/evo-ai-frontend-community.git
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
        VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:3001}
        VITE_EVOAI_API_URL: ${VITE_EVOAI_API_URL:-http://localhost:5555}
        VITE_AGENT_PROCESSOR_URL: ${VITE_AGENT_PROCESSOR_URL:-http://localhost:8000}
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      VITE_AUTH_API_URL: ${VITE_AUTH_API_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-http://localhost:3000}
      VITE_EVOAI_API_URL: ${VITE_EVOAI_API_URL:-http://localhost:5555}
      VITE_AGENT_PROCESSOR_URL: ${VITE_AGENT_PROCESSOR_URL:-http://localhost:8000}
    ports:
      - "5174:80"
    depends_on:
      - evo-auth
      - evo-crm
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  crm_bundle:
  crm_cache:
  processor_logs:
